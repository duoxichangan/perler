<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- 定义渐变：从左上的浅粉色过渡到右下的深粉色 -->
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb3d1" />
      <stop offset="100%" stop-color="#ff66a3" />
    </linearGradient>

    <!-- 定义相机镜头处的渐变 -->
    <linearGradient id="lensGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fbe4f0" />
    </linearGradient>

    <!-- 定义左下角阴影的渐变 -->
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9bc2" />
      <stop offset="100%" stop-color="#ff7cb0" />
    </linearGradient>
  </defs>

  <!-- 主阴影层 (模拟3D厚度) -->
  <rect x="10" y="10" width="75" height="75" rx="20" fill="url(#shadowGradient)" transform="rotate(-15, 47.5, 47.5)" />

  <!-- 相机主体形状 -->
  <rect x="7" y="7" width="75" height="75" rx="20" fill="url(#bodyGradient)" transform="rotate(-15, 44.5, 44.5)" />

  <!-- 左上角的闪光灯/小圆点 -->
  <ellipse cx="21" cy="24" rx="6" ry="3.5" fill="#ffdcea" opacity="0.9" transform="rotate(-15, 21, 24)" />

  <!-- 中心圆孔的内圈阴影 (增加立体感) -->
  <circle cx="46" cy="46" r="15.5" fill="#ff7cb0" opacity="0.6" />

  <!-- 中心圆孔 -->
  <circle cx="45" cy="45" r="15" fill="url(#lensGradient)" />

  <!-- 镜头内圈高光线 -->
  <circle cx="45" cy="45" r="13" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5" />
</svg>